<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Expense Tracker</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

:root{
--bg:#f4f7fb;
--card:#ffffff;
--text:#111827;
--sub:#6b7280;
--blue:#2563eb;
--green:#16a34a;
--red:#ef4444;
--border:#e5e7eb;
}

.dark{
--bg:#081120;
--card:#162033;
--text:#ffffff;
--sub:#cbd5e1;
--border:#253045;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:var(--bg);
color:var(--text);
padding:18px 18px 110px;
transition:.3s;
}

.container{
max-width:720px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.logo{
font-size:24px;
font-weight:700;
}

.header-right{
display:flex;
gap:10px;
}

.icon-btn{
border:none;
background:var(--card);
padding:11px 14px;
border-radius:14px;
cursor:pointer;
font-size:14px;
font-weight:600;
color:var(--text);
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.month{
font-size:13px;
color:var(--sub);
margin-bottom:16px;
}

.top{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:18px;
}

.stat{
background:var(--card);
padding:16px;
border-radius:20px;
box-shadow:0 2px 10px rgba(0,0,0,.04);
}

.stat h4{
font-size:12px;
margin-bottom:6px;
color:var(--sub);
}

.stat h2{
font-size:18px;
font-weight:700;
word-break:break-word;
}

.green{
color:var(--green);
}

.red{
color:var(--red);
}

.blue{
color:var(--blue);
}

.card{
background:var(--card);
padding:18px;
border-radius:22px;
margin-bottom:18px;
box-shadow:0 2px 10px rgba(0,0,0,.04);
}

.card-title{
font-size:16px;
font-weight:700;
margin-bottom:16px;
}

.grid{
display:grid;
gap:14px;
}

input,
select,
textarea{
width:100%;
padding:14px;
border:1px solid var(--border);
background:transparent;
border-radius:16px;
font-size:14px;
outline:none;
color:var(--text);
}

textarea{
min-height:80px;
resize:none;
}

.save-btn{
background:var(--blue);
color:white;
border:none;
padding:14px;
border-radius:16px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.item{
background:var(--bg);
padding:14px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

.item h4{
font-size:14px;
margin-bottom:4px;
}

.item p{
font-size:12px;
color:var(--sub);
}

.amount{
font-size:15px;
font-weight:700;
}

.page{
display:none;
}

.active{
display:block;
}

.bottom-nav{
position:fixed;
left:50%;
bottom:16px;
transform:translateX(-50%);
width:92%;
max-width:430px;
background:var(--card);
padding:10px;
border-radius:24px;
display:flex;
justify-content:space-around;
box-shadow:0 8px 25px rgba(0,0,0,.12);
z-index:999;
}

.nav-btn{
border:none;
background:none;
padding:10px 16px;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
font-size:11px;
font-weight:600;
color:var(--sub);
cursor:pointer;
min-width:82px;
}

.nav-btn.active-nav{
background:var(--blue);
color:white;
}

.loan-box{
background:var(--bg);
padding:16px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:12px;
}

.loan-box h4{
font-size:15px;
}

.toast{
position:fixed;
bottom:95px;
left:50%;
transform:translateX(-50%);
background:var(--green);
color:white;
padding:12px 18px;
border-radius:14px;
font-size:13px;
font-weight:600;
opacity:0;
pointer-events:none;
transition:.3s;
}

.toast.show{
opacity:1;
bottom:115px;
}

</style>

</head>

<body>

<div class="container">

<!-- DASHBOARD -->

<div id="dashboard"
class="page active">

<div class="header">

<div class="logo">
Expense Tracker
</div>

<div class="header-right">

<button class="icon-btn"
onclick="refreshNow()">

⟳

</button>

<button class="icon-btn"
onclick="toggleDark()">

🌙

</button>

</div>

</div>

<div class="month"
id="monthName"></div>

<div class="top">

<div class="stat">

<h4>Total Income</h4>

<h2 class="green"
id="income">

৳ 0

</h2>

</div>

<div class="stat">

<h4>Total Expense</h4>

<h2 class="red"
id="expense">

৳ 0

</h2>

</div>

<div class="stat">

<h4>Current Balance</h4>

<h2 class="blue"
id="balance">

৳ 0

</h2>

</div>

</div>

<!-- FORM -->

<div class="card">

<div class="card-title">

Add Transaction

</div>

<div class="grid">

<select id="type"
onchange="updateCategory()">

<option value="">
Select Type
</option>

<option>
Income
</option>

<option>
Expense
</option>

</select>

<select id="category">

<option value="">
Select Category
</option>

</select>

<select id="payment">

<option>Cash</option>
<option>Bkash</option>
<option>Nagad</option>
<option>Bank</option>

</select>

<input type="number"
id="amount"
placeholder="Enter Amount">

<input type="text"
id="person"
placeholder="Person Name"
style="display:none;">

<textarea id="note"
placeholder="Write Note"></textarea>

<button class="save-btn"
id="saveBtn"
onclick="saveData()">

Save Entry

</button>

</div>

</div>

<!-- RECENT -->

<div class="card">

<div class="card-title">

Recent Transactions

</div>

<div id="transactionList"></div>

</div>

</div>

<!-- HISTORY -->

<div id="history"
class="page">

<div class="card">

<div class="card-title">

Transaction History

</div>

<input type="text"
id="searchInput"
placeholder="Search..."
onkeyup="filterHistory()">

<div id="historyList"></div>

</div>

</div>

<!-- LOANS -->

<div id="loans"
class="page">

<div class="card">

<div class="card-title">

Loan Summary

</div>

<div class="loan-box">

<h4>
You Will Receive
</h4>

<div class="amount green"
id="receiveAmount">

৳ 0

</div>

</div>

<div class="loan-box">

<h4>
You Need To Pay
</h4>

<div class="amount red"
id="payAmount">

৳ 0

</div>

</div>

<div class="loan-box">

<h4>
Loan Status
</h4>

<div class="amount blue"
id="loanStatus">

৳ 0

</div>

</div>

<div id="loanSummaryList"></div>

</div>

</div>

</div>

<!-- NAV -->

<div class="bottom-nav">

<button class="nav-btn active-nav"
onclick="
showPage('dashboard');
setActive(this)
">

🏠
Home

</button>

<button class="nav-btn"
onclick="
showPage('history');
setActive(this)
">

📜
History

</button>

<button class="nav-btn"
onclick="
showPage('loans');
setActive(this)
">

💰
Loans

</button>

</div>

<!-- TOAST -->

<div class="toast"
id="toast">

Saved Successfully

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxA3FVbmfnbYjPJHd6QmgWbZp2fe3MGtiVX9jWHJ6xBNzk4HYQJH0_5XZalXrba8c3YFg/exec";

// MONTH

document.getElementById(
"monthName"
).innerText =
new Date().toLocaleString(
'default',
{
month:'long',
year:'numeric'
}
);

// DARK MODE

function toggleDark(){

document.body.classList.toggle(
"dark"
);

}

// NAV

function showPage(id){

document
.querySelectorAll(".page")
.forEach(page => {

page.classList.remove(
"active"
);

});

document.getElementById(id)
.classList.add("active");

}

function setActive(btn){

document
.querySelectorAll(".nav-btn")
.forEach(button => {

button.classList.remove(
"active-nav"
);

});

btn.classList.add(
"active-nav"
);

}

// CATEGORY

function updateCategory(){

let type =
document.getElementById(
"type"
).value;

let category =
document.getElementById(
"category"
);

category.innerHTML = "";

let options = [];

if(type == "Income"){

options = [

"Salary",
"Business",
"Bonus",
"Extra Work",
"Take Loan",
"Loan Received"

];

}

if(type == "Expense"){

options = [

"Personal",
"Family",
"Home Expense",
"DPS Payment",
"Give Loan",
"Loan Paid"

];

}

options.forEach(item => {

let option =
document.createElement(
"option"
);

option.text = item;

option.value = item;

category.appendChild(option);

});

}

// PERSON FIELD

document.getElementById(
"category"
).addEventListener(
"change",
function(){

let person =
document.getElementById(
"person"
);

let payment =
document.getElementById(
"payment"
);

if(
[
"Give Loan",
"Take Loan",
"Loan Paid",
"Loan Received"
].includes(this.value)
){

person.style.display =
"block";

}

else{

person.style.display =
"none";

}

if(this.value ==
"DPS Payment"){

payment.value =
"Bkash";

}

}
);

// TOAST

function showToast(msg){

let toast =
document.getElementById(
"toast"
);

toast.innerText = msg;

toast.classList.add(
"show"
);

setTimeout(() => {

toast.classList.remove(
"show"
);

},2000);

}

// SAVE

function saveData(){

let btn =
document.getElementById(
"saveBtn"
);

btn.innerText =
"Saving...";

let data = {

date:
new Date().toLocaleString(),

type:
document.getElementById(
"type"
).value,

category:
document.getElementById(
"category"
).value,

payment:
document.getElementById(
"payment"
).value,

amount:
document.getElementById(
"amount"
).value,

person:
document.getElementById(
"person"
).value,

note:
document.getElementById(
"note"
).value

};

fetch(SCRIPT_URL,{

method:"POST",

body:JSON.stringify(data)

})

.then(res => res.text())

.then(() => {

btn.innerText =
"Save Entry";

document.getElementById(
"amount"
).value = "";

document.getElementById(
"note"
).value = "";

showToast(
"Saved Successfully"
);

loadDashboard();

})

.catch(() => {

btn.innerText =
"Save Entry";

alert("Save Failed");

});

}

// LOAD

function loadDashboard(){

fetch(SCRIPT_URL)

.then(res => res.json())

.then(data => {

document.getElementById(
"income"
).innerText =
"৳ " +
(data.income || 0);

document.getElementById(
"expense"
).innerText =
"৳ " +
(data.expense || 0);

document.getElementById(
"balance"
).innerText =
"৳ " +
(data.balance || 0);

document.getElementById(
"receiveAmount"
).innerText =
"৳ " +
(data.receive || 0);

document.getElementById(
"payAmount"
).innerText =
"৳ " +
(data.pay || 0);

document.getElementById(
"loanStatus"
).innerText =
"৳ " +
(
(data.receive || 0)
-
(data.pay || 0)
);

// RECENT

let list =
document.getElementById(
"transactionList"
);

list.innerHTML = "";

(data.recent || [])
.slice(0,3)
.forEach(item => {

let cls =
item.type ==
"Income"
? "green"
: "red";

list.innerHTML += `

<div class="item">

<div>

<h4>
${item.category}
</h4>

<p>
${item.date}
</p>

</div>

<div class="amount ${cls}">

৳ ${item.amount}

</div>

</div>

`;

});

// HISTORY

let history =
document.getElementById(
"historyList"
);

history.innerHTML = "";

(data.recent || [])
.forEach(item => {

let cls =
item.type ==
"Income"
? "green"
: "red";

history.innerHTML += `

<div class="item history-item">

<div>

<h4>
${item.category}
</h4>

<p>
${item.date}
</p>

</div>

<div class="amount ${cls}">

৳ ${item.amount}

</div>

</div>

`;

});

// LOAN SUMMARY

let loanSummary =
document.getElementById(
"loanSummaryList"
);

loanSummary.innerHTML = "";

let loanMap = {};

(data.recent || [])
.forEach(item => {

if(
item.person &&
[
"Give Loan",
"Take Loan",
"Loan Paid",
"Loan Received"
].includes(item.category)
){

if(!loanMap[item.person]){

loanMap[item.person] = 0;

}

// GIVE LOAN

if(item.category == "Give Loan"){

loanMap[item.person] +=
Number(item.amount);

}

// LOAN RECEIVED

if(item.category == "Loan Received"){

loanMap[item.person] -=
Number(item.amount);

}

// TAKE LOAN

if(item.category == "Take Loan"){

loanMap[item.person] -=
Number(item.amount);

}

// LOAN PAID

if(item.category == "Loan Paid"){

loanMap[item.person] +=
Number(item.amount);

}

}

});

// SHOW ONLY NON ZERO

for(let person in loanMap){

let amount =
loanMap[person];

if(amount == 0){

continue;

}

let cls =
amount > 0
? "green"
: "red";

let status =
amount > 0
? "You Will Receive"
: "You Need To Pay";

loanSummary.innerHTML += `

<div class="item">

<div>

<h4>
${person}
</h4>

<p>
${status}
</p>

</div>

<div class="amount ${cls}">

৳ ${Math.abs(amount)}

</div>

</div>

`;

}

});

}

// SEARCH

function filterHistory(){

let value =
document.getElementById(
"searchInput"
)
.value
.toLowerCase();

document
.querySelectorAll(
".history-item"
)
.forEach(item => {

item.style.display =
item.innerText
.toLowerCase()
.includes(value)
? "flex"
: "none";

});

}

// REFRESH

function refreshNow(){

showToast(
"Refreshing..."
);

loadDashboard();

}

setInterval(() => {

loadDashboard();

},15000);

// INIT

loadDashboard();

</script>

</body>

</html>
