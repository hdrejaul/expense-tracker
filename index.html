<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Luxury Light Mode */
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --sub: #64748b;
            --blue: #2563eb; --green: #10b981; --red: #ef4444; 
            --border: rgba(226, 232, 240, 0.8);
            --item-bg: #ffffff;
            --bkash: #d12053; --nagad: #f7941d; --bank: #006747;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04);
        }

        body.dark-mode {
            --bg: #020617; --card: #0f172a; --text: #f8fafc; --sub: #94a3b8; 
            --border: #1e293b; --item-bg: #111a2e;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding: 18px 18px 110px; transition: all 0.3s ease; }
        .container { max-width: 500px; margin: auto; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--blue); }
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { border: none; background: var(--card); color: var(--text); width: 42px; height: 42px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); box-shadow: var(--shadow); font-size: 18px; transition: 0.3s; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning span { display: inline-block; animation: spin 0.8s linear infinite; }

        /* 🔥 Minimalist Wallet Style 🔥 */
        .wallet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 22px; }
        .wallet-card { 
            background: var(--card); padding: 12px 16px; border-radius: 16px; 
            border: 1px solid var(--border); box-shadow: var(--shadow); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .wallet-info h4 { font-size: 9px; color: var(--sub); text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
        .wallet-info h2 { font-size: 14px; font-weight: 700; }
        .wallet-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }

        /* Stats */
        .main-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 16px 5px; border-radius: 20px; border: 1px solid var(--border); text-align: center; box-shadow: var(--shadow); }
        .stat-box h4 { font-size: 10px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .stat-box h2 { font-size: 13px; font-weight: 800; }

        /* Form Card */
        .card { background: var(--card); padding: 24px; border-radius: 28px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .card-title { font-size: 18px; font-weight: 800; margin-bottom: 18px; }

        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); background: var(--bg); border-radius: 14px; font-size: 14px; color: var(--text); outline: none; margin-bottom: 14px; font-weight: 500; }
        .save-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); }

        /* Recent Activity & History Card Style */
        .activity-card { background: var(--card); padding: 22px; border-radius: 28px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .activity-item { 
            background: var(--card); padding: 15px; border-radius: 18px; 
            margin-bottom: 10px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--shadow);
        }
        .activity-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .activity-info p { font-size: 11px; color: var(--sub); }
        .activity-info span { font-size: 10px; color: var(--blue); font-weight: 600; text-transform: uppercase; }

        /* Tags */
        .pay-tag { color: white; font-size: 9px; padding: 4px 12px; border-radius: 8px; font-weight: 700; text-transform: uppercase; display: inline-block; margin-top: 10px; background: #64748b; }
        .pay-tag.bkash { background: var(--bkash); }
        .pay-tag.nagad { background: var(--nagad); }
        .pay-tag.bank { background: var(--bank); }
        .person-tag { background: rgba(37, 99, 235, 0.1); color: var(--blue); font-size: 9px; padding: 4px 14px; border-radius: 10px; font-weight: 700; margin-left: 6px; }

        /* Nav */
        .bottom-nav { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); width: 92%; max-width: 430px; background: var(--card); padding: 10px; border-radius: 30px; display: flex; justify-content: space-around; box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 999; border: 1px solid var(--border); }
        .nav-btn { border: none; background: none; padding: 12px 20px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; color: var(--sub); cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-btn.active-nav { background: var(--blue); color: white; box-shadow: 0 8px 15px rgba(37, 99, 235, 0.3); }

        #toast { visibility: hidden; min-width: 250px; background: #10b981; color: white; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 100px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3); }
        #toast.show { visibility: visible; animation: fadeInUp 0.4s forwards, fadeOut 0.4s 2.5s forwards; }
        @keyframes fadeInUp { from { opacity: 0; bottom: 80px; } to { opacity: 1; bottom: 100px; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        .green { color: var(--green); } .red { color: var(--red); } .blue { color: var(--blue); }
        .amount { font-size: 16px; font-weight: 800; }
    </style>
</head>

<body class="dark-mode">

<div id="toast">✅ Saved Successfully!</div>

<div class="container">
    <div id="dashboard" class="page active">
        <div class="header">
            <div class="logo">Expense Tracker</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleDarkMode()">🌓</button>
                <button class="icon-btn" id="refreshBtn" onclick="hardRefresh()"><span>⟳</span></button>
            </div>
        </div>

        <div class="wallet-grid">
            <div class="wallet-card">
                <div class="wallet-info"><h4>Cash</h4><h2 id="cashBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:#64748b"></div>
            </div>
            <div class="wallet-card">
                <div class="wallet-info"><h4>Bkash</h4><h2 id="bkashBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:var(--bkash)"></div>
            </div>
            <div class="wallet-card">
                <div class="wallet-info"><h4>Nagad</h4><h2 id="nagadBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:var(--nagad)"></div>
            </div>
            <div class="wallet-card">
                <div class="wallet-info"><h4>Bank</h4><h2 id="bankBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:var(--bank)"></div>
            </div>
        </div>

        <div class="main-stats">
            <div class="stat-box"><h4>Income</h4><h2 class="green" id="income">৳ 0</h2></div>
            <div class="stat-box"><h4>Expense</h4><h2 class="red" id="expense">৳ 0</h2></div>
            <div class="stat-box"><h4>Balance</h4><h2 class="blue" id="balance">৳ 0</h2></div>
        </div>

        <div class="card">
            <div class="card-title">Add Entry</div>
            <select id="type" onchange="updateCategory()"><option value="">Type</option><option>Income</option><option>Expense</option></select>
            <select id="category" onchange="handleCategoryChange()"><option value="">Category</option></select>
            <select id="payment"><option>Cash</option><option>Bkash</option><option>Nagad</option><option>Bank</option></select>
            <input type="number" id="amount" placeholder="Amount">
            <input type="text" id="person" placeholder="Person Name" style="display:none;">
            <textarea id="note" placeholder="Note (Optional)"></textarea>
            <button class="save-btn" id="saveBtn" onclick="saveData()">Save Transaction</button>
        </div>

        <div class="activity-card">
            <div class="card-title" style="font-size: 16px;">⚡ Recent Activity</div>
            <div id="recentList"></div>
        </div>
    </div>

    <div id="history" class="page">
        <div class="activity-card">
            <div class="card-title">All History</div>
            <input type="text" id="searchInput" placeholder="Search transactions..." onkeyup="filterHistory()">
            <div id="historyList"></div>
        </div>
    </div>

    <div id="loans" class="page">
        <div class="card">
            <div class="card-title">Loan Summary</div>
            <div style="background: linear-gradient(135deg, #1e293b, #020617); padding: 35px 20px; border-radius: 28px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border);">
                <h4 style="font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px;">Net Loan</h4>
                <h2 id="loanStatus" style="font-size: 28px; font-weight: 800; color: #60a5fa;">৳ 0</h2>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom: 25px;">
                <div class="stat-box"><h4>Receive</h4><h2 class="green" id="receiveAmount">৳ 0</h2></div>
                <div class="stat-box"><h4>Pay</h4><h2 class="red" id="payAmount">৳ 0</h2></div>
            </div>
            <div id="loanSummaryList"></div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active-nav" onclick="showPage('dashboard', this)">🏠<br>Home</button>
    <button class="nav-btn" onclick="showPage('history', this)">📜<br>History</button>
    <button class="nav-btn" onclick="showPage('loans', this)">💰<br>Loans</button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxA3FVbmfnbYjPJHd6QmgWbZp2fe3MGtiVX9jWHJ6xBNzk4HYQJH0_5XZalXrba8c3YFg/exec";

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        btn.classList.add('active-nav');
    }

    function toggleDarkMode() { document.body.classList.toggle("dark-mode"); }

    function hardRefresh() {
        const btn = document.getElementById("refreshBtn");
        btn.classList.add("spinning");
        document.getElementById("amount").value = "";
        document.getElementById("note").value = "";
        document.getElementById("person").value = "";
        document.getElementById("type").value = "";
        document.getElementById("category").innerHTML = '<option value="">Category</option>';
        loadDashboard().finally(() => { setTimeout(() => btn.classList.remove("spinning"), 1000); });
    }

    function updateCategory(){
        let type = document.getElementById("type").value;
        let cat = document.getElementById("category");
        cat.innerHTML = "";
        let opts = type == "Income" ? ["Salary","Extra Work","Bonus","Take Loan","Loan Received"] : ["Personal","Family","Home Expense","Bills","DPS Payment","Give Loan","Loan Paid"];
        opts.forEach(o => { let el = document.createElement("option"); el.value = el.text = o; cat.appendChild(el); });
    }

    function handleCategoryChange(){
        let cat = document.getElementById("category").value;
        document.getElementById("person").style.display = ["Give Loan","Take Loan","Loan Received","Loan Paid"].includes(cat) ? "block" : "none";
        if(cat === "DPS Payment") document.getElementById("payment").value = "Bkash";
    }

    function saveData(){
        let btn = document.getElementById("saveBtn");
        btn.innerText = "Processing...";
        let data = {
            date: new Date().toLocaleDateString('en-GB'),
            type: document.getElementById("type").value,
            category: document.getElementById("category").value,
            payment: document.getElementById("payment").value,
            amount: document.getElementById("amount").value,
            person: document.getElementById("person").value,
            note: document.getElementById("note").value
        };
        fetch(SCRIPT_URL, { method:"POST", body:JSON.stringify(data) }).then(() => { 
            btn.innerText = "Save Transaction"; 
            document.getElementById("toast").classList.add("show");
            setTimeout(() => { document.getElementById("toast").classList.remove("show"); }, 3000);
            hardRefresh(); 
        });
    }

    function getPayTagClass(m){
        if(!m) return "pay-tag";
        m = m.toLowerCase();
        if(m.includes("bkash")) return "pay-tag bkash";
        if(m.includes("nagad")) return "pay-tag nagad";
        if(m.includes("bank")) return "pay-tag bank";
        return "pay-tag";
    }

    async function loadDashboard(){
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            document.getElementById("income").innerText = "৳ " + (data.income || 0);
            document.getElementById("expense").innerText = "৳ " + (data.expense || 0);
            document.getElementById("balance").innerText = "৳ " + (data.balance || 0);
            
            let pBal = { Cash: 0, Bkash: 0, Nagad: 0, Bank: 0 };
            (data.recent || []).forEach(item => {
                let amt = Number(item.amount);
                if (pBal.hasOwnProperty(item.payment)) pBal[item.payment] += (item.type == "Income" ? amt : -amt);
            });
            document.getElementById("cashBal").innerText = "৳ " + pBal.Cash;
            document.getElementById("bkashBal").innerText = "৳ " + pBal.Bkash;
            document.getElementById("nagadBal").innerText = "৳ " + pBal.Nagad;
            document.getElementById("bankBal").innerText = "৳ " + pBal.Bank;

            let recent = document.getElementById("recentList"); recent.innerHTML = "";
            (data.recent || []).slice(0,3).forEach(item => {
                let cls = item.type == "Income" ? "green" : "red";
                let displayDate = item.date.split('T')[0]; 
                recent.innerHTML += `
                    <div class="activity-item">
                        <div class="activity-info">
                            <h4>${item.category}</h4>
                            <p>${displayDate}</p>
                            <span>${item.payment}</span>
                        </div>
                        <div class="amount ${cls}">৳ ${item.amount}</div>
                    </div>`;
            });

            let history = document.getElementById("historyList"); history.innerHTML = "";
            (data.recent || []).forEach((item) => {
                let cls = item.type == "Income" ? "green" : "red";
                let displayDate = item.date.split('T')[0]; 
                history.innerHTML += `
                    <div class="activity-item">
                        <div style="flex:1">
                            <h4 style="font-size:15px; font-weight:700;">${item.category}</h4>
                            <p style="font-size:11px; color:var(--sub); margin-bottom:4px;">${displayDate}</p>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top:8px;">
                                <span class="${getPayTagClass(item.payment)}">${item.payment}</span>
                                ${item.person ? `<span class="person-tag">👤 ${item.person}</span>` : ''}
                            </div>
                            ${item.note ? `<div style="background:rgba(100,116,139,0.05); padding:10px; border-radius:12px; margin-top:10px; font-size:11px; font-style:italic; border-left:3px solid var(--blue);">"${item.note}"</div>` : ''}
                        </div>
                        <div style="text-align:right; margin-left:15px;">
                            <div class="amount ${cls}">৳ ${item.amount}</div>
                        </div>
                    </div>`;
            });

            let recVal = data.receive || 0; let payVal = data.pay || 0;
            document.getElementById("receiveAmount").innerText = "৳ " + Math.abs(recVal);
            document.getElementById("payAmount").innerText = "৳ " + Math.abs(payVal);
            document.getElementById("loanStatus").innerText = "৳ " + (recVal - payVal);

            let loanSummary = document.getElementById("loanSummaryList"); loanSummary.innerHTML = "";
            let loanMap = {};
            (data.recent || []).forEach(item => {
                if(item.person && ["Give Loan","Take Loan","Loan Received","Loan Paid"].includes(item.category)){
                    let p = item.person.trim().toLowerCase();
                    if(!loanMap[p]) loanMap[p] = { name: item.person.trim(), bal: 0 };
                    let a = Number(item.amount);
                    if(item.category == "Give Loan" || item.category == "Loan Paid") loanMap[p].bal += a; else loanMap[p].bal -= a;
                }
            });
            for(let k in loanMap){
                if(loanMap[k].bal == 0) continue;
                loanSummary.innerHTML += `<div class="activity-item"><div><h4 style="font-size:16px; font-weight:700;">${loanMap[k].name}</h4><p style="font-size:12px; color:var(--sub);">${loanMap[k].bal > 0 ? 'Will Receive' : 'Need To Pay'}</p></div><div style="font-weight:800; font-size:17px;" class="${loanMap[k].bal > 0 ? "green" : "red"}">৳ ${Math.abs(loanMap[k].bal)}</div></div>`;
            }
        } catch (e) { console.log(e); }
    }

    function filterHistory(){
        let v = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#historyList .activity-item").forEach(i => i.style.display = i.innerText.toLowerCase().includes(v) ? "flex" : "none");
    }

    loadDashboard();
</script>
</body>
</html>
