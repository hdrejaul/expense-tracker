<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f4f7fb; --card: #ffffff; --text: #111827; --sub: #6b7280;
            --blue: #2563eb; --green: #16a34a; --red: #ef4444; --border: #e5e7eb;
            --note-bg: #f1f5f9; --note-border: #3b82f6;
            --bkash: #d12053; --nagad: #f7941d; --bank: #006747;
        }

        body.dark-mode {
            --bg: #081120; --card: #162033; --text: #ffffff; --sub: #cbd5e1; --border: #253045;
            --note-bg: #1e293b; --note-border: #60a5fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); padding: 18px 18px 110px; transition: .3s; }
        .container { max-width: 720px; margin: auto; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-size: 20px; font-weight: 800; color: var(--blue); }
        .refresh-fab { border: none; background: var(--blue); color: white; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s; }
        
        /* 🔥 Refresh Animation Logic 🔥 */
        .refresh-fab span { display: inline-block; transition: 0.8s ease-in-out; }
        .spinning span { transform: rotate(360deg); }

        /* Wallet Cards */
        .wallet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .wallet-card { background: var(--card); padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
        .wallet-card h4 { font-size: 9px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .wallet-card h2 { font-size: 14px; font-weight: 700; }

        /* Stats */
        .top-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 14px 8px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .stat-box h4 { font-size: 9px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; }
        .stat-box h2 { font-size: 13px; font-weight: 700; }

        /* Entry Card */
        .card { background: var(--card); padding: 22px; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        .card-title { font-size: 17px; font-weight: 700; margin-bottom: 15px; }

        input, select, textarea { width: 100%; padding: 13px; border: 1px solid var(--border); background: var(--bg); border-radius: 12px; font-size: 14px; color: var(--text); outline: none; margin-bottom: 10px; }
        .save-btn { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; }
        .save-btn:active { transform: scale(0.98); }

        /* 🔥 Activity Card Design (১১৯২০ স্ক্রিনশট অনুযায়ী) 🔥 */
        .activity-card { background: var(--card); padding: 22px; border-radius: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
        .activity-item { background: var(--card); padding: 15px; border-radius: 18px; margin-bottom: 10px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .activity-info h4 { font-size: 14px; font-weight: 700; }
        .activity-info p { font-size: 11px; color: var(--sub); margin-top: 2px; }
        .activity-amount { font-size: 15px; font-weight: 800; }

        /* General Item (History) */
        .item { background: var(--card); padding: 18px; border-radius: 22px; margin-top: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
        .pay-tag { color: white; font-size: 9px; padding: 3px 12px; border-radius: 20px; font-weight: 700; text-transform: uppercase; display: inline-block; margin-top: 8px; background: #475569; }
        .pay-tag.bkash { background: var(--bkash); }
        .pay-tag.nagad { background: var(--nagad); }
        .pay-tag.bank { background: var(--bank); }
        .person-tag { background: #e2e8f0; color: #475569; font-size: 9px; padding: 3px 12px; border-radius: 20px; font-weight: 700; margin-left: 5px; }

        /* Nav */
        .bottom-nav { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); width: 92%; max-width: 430px; background: var(--card); padding: 10px; border-radius: 24px; display: flex; justify-content: space-around; box-shadow: 0 8px 25px rgba(0,0,0,.1); z-index: 999; border: 1px solid var(--border); }
        .nav-btn { border: none; background: none; padding: 8px 14px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: var(--sub); cursor: pointer; }
        .nav-btn.active-nav { background: var(--blue); color: white; }

        /* Toast */
        #toast { visibility: hidden; min-width: 200px; background: var(--green); color: white; text-align: center; border-radius: 50px; padding: 12px; position: fixed; z-index: 1000; left: 50%; bottom: 100px; transform: translateX(-50%); font-weight: 700; }
        #toast.show { visibility: visible; animation: fadeInUp 0.4s forwards; }
        @keyframes fadeInUp { from { opacity: 0; bottom: 80px; } to { opacity: 1; bottom: 100px; } }

        .green { color: var(--green); } .red { color: var(--red); } .blue { color: var(--blue); }
        .page { display: none; } .active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

<body class="dark-mode"> 

<div id="toast">✅ Saved Successfully</div>

<div class="container">
    <div id="dashboard" class="page active">
        <div class="header">
            <div class="logo">Expense Tracker</div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button onclick="toggleDark()" style="border:none; background:none; font-size:20px; cursor:pointer;">🌓</button>
                <button class="refresh-fab" id="refreshBtn" onclick="refreshNow()"><span id="refreshIcon">⟳</span></button>
            </div>
        </div>

        <div class="wallet-grid">
            <div class="wallet-card"><h4>Cash</h4><h2 id="cashBal">৳ 0</h2></div>
            <div class="wallet-card"><h4>Bkash</h4><h2 id="bkashBal">৳ 0</h2></div>
            <div class="wallet-card"><h4>Nagad</h4><h2 id="nagadBal">৳ 0</h2></div>
            <div class="wallet-card"><h4>Bank</h4><h2 id="bankBal">৳ 0</h2></div>
        </div>

        <div class="top-stats">
            <div class="stat-box"><h4>Income</h4><h2 class="green" id="income">৳ 0</h2></div>
            <div class="stat-box"><h4>Expense</h4><h2 class="red" id="expense">৳ 0</h2></div>
            <div class="stat-box"><h4>Balance</h4><h2 class="blue" id="balance">৳ 0</h2></div>
        </div>

        <div class="card">
            <div class="card-title">Add Transaction</div>
            <select id="type" onchange="updateCategory()"><option value="">Type</option><option>Income</option><option>Expense</option></select>
            <select id="category" onchange="handleCategoryChange()"><option value="">Category</option></select>
            <select id="payment"><option>Cash</option><option>Bkash</option><option>Nagad</option><option>Bank</option></select>
            <input type="number" id="amount" placeholder="Amount">
            <input type="text" id="person" placeholder="Person Name" style="display:none;">
            <textarea id="note" placeholder="Write Note (Optional)"></textarea>
            <button class="save-btn" id="saveBtn" onclick="saveData()">Save Entry</button>
        </div>

        <div class="activity-card">
            <div class="card-title">Recent Activity</div>
            <div id="recentList"></div>
        </div>
    </div>

    <div id="history" class="page">
        <div class="card">
            <div class="card-title">Full History</div>
            <input type="text" id="searchInput" placeholder="Search..." onkeyup="filterHistory()">
            <div id="historyList"></div>
        </div>
    </div>

    <div id="loans" class="page">
        <div class="card">
            <div class="card-title">Loan Summary</div>
            <div style="background: var(--bg); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid var(--border);">
                <h4 style="font-size: 11px; color: var(--sub); text-transform: uppercase;">Net Loan Status</h4>
                <h2 class="blue" id="loanStatus" style="font-size: 26px;">৳ 0</h2>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom: 15px;">
                <div class="stat-box"><h4>Receive</h4><h2 class="green" id="receiveAmount">৳ 0</h2></div>
                <div class="stat-box"><h4>Pay</h4><h2 class="red" id="payAmount">৳ 0</h2></div>
            </div>
            <div id="loanSummaryList"></div>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-btn active-nav" onclick="showPage('dashboard', this)">🏠<br>Home</button>
    <button class="nav-btn" onclick="showPage('history', this)">📜<br>History</button>
    <button class="nav-btn" onclick="showPage('loans', this)">💰<br>Loans</button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxA3FVbmfnbYjPJHd6QmgWbZp2fe3MGtiVX9jWHJ6xBNzk4HYQJH0_5XZalXrba8c3YFg/exec";

    function toggleDark() { document.body.classList.toggle("dark-mode"); }

    function showPage(id, btn) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active-nav"));
        btn.classList.add("active-nav");
    }

    // 🔥 Fix: Refresh Function with Animation & Clear 🔥
    function refreshNow(){
        const btn = document.getElementById("refreshBtn");
        btn.classList.add("spinning");
        
        // ফর্ম ক্লিয়ার করা
        document.getElementById("amount").value = "";
        document.getElementById("note").value = "";
        document.getElementById("person").value = "";
        document.getElementById("type").value = "";
        document.getElementById("category").innerHTML = '<option value="">Category</option>';
        document.getElementById("payment").value = "Cash";

        loadDashboard();

        setTimeout(() => {
            btn.classList.remove("spinning");
        }, 800);
    }

    function updateCategory(){
        let type = document.getElementById("type").value;
        let cat = document.getElementById("category");
        cat.innerHTML = "";
        let opts = type == "Income" ? ["Salary","Extra Work","Bonus","Take Loan","Loan Received"] : ["Personal","Family","Home Expense","Bills","DPS Payment","Give Loan","Loan Paid"];
        opts.forEach(o => { let el = document.createElement("option"); el.value = el.text = o; cat.appendChild(el); });
    }

    function handleCategoryChange(){
        let cat = document.getElementById("category").value;
        document.getElementById("person").style.display = ["Give Loan","Take Loan","Loan Received","Loan Paid"].includes(cat) ? "block" : "none";
        if(cat === "DPS Payment") document.getElementById("payment").value = "Bkash";
    }

    function saveData(){
        let btn = document.getElementById("saveBtn");
        btn.innerText = "Saving...";
        let data = {
            date: new Date().toLocaleDateString('en-GB'),
            type: document.getElementById("type").value,
            category: document.getElementById("category").value,
            payment: document.getElementById("payment").value,
            amount: document.getElementById("amount").value,
            person: document.getElementById("person").value,
            note: document.getElementById("note").value
        };
        fetch(SCRIPT_URL, { method:"POST", body:JSON.stringify(data) }).then(() => { 
            document.getElementById("toast").className = "show";
            setTimeout(() => { document.getElementById("toast").className = ""; }, 3000);
            btn.innerText = "Save Entry";
            refreshNow(); 
        });
    }

    function getPayTagClass(method){
        if(!method) return "pay-tag";
        let m = method.toLowerCase();
        if(m.includes("bkash")) return "pay-tag bkash";
        if(m.includes("nagad")) return "pay-tag nagad";
        if(m.includes("bank")) return "pay-tag bank";
        return "pay-tag";
    }

    function loadDashboard(){
        fetch(SCRIPT_URL).then(res => res.json()).then(data => {
            document.getElementById("income").innerText = "৳ " + (data.income || 0);
            document.getElementById("expense").innerText = "৳ " + (data.expense || 0);
            document.getElementById("balance").innerText = "৳ " + (data.balance || 0);
            
            let pBal = { Cash: 0, Bkash: 0, Nagad: 0, Bank: 0 };
            (data.recent || []).forEach(item => {
                let amt = Number(item.amount);
                if (pBal.hasOwnProperty(item.payment)) pBal[item.payment] += (item.type == "Income" ? amt : -amt);
            });
            document.getElementById("cashBal").innerText = "৳ " + pBal.Cash;
            document.getElementById("bkashBal").innerText = "৳ " + pBal.Bkash;
            document.getElementById("nagadBal").innerText = "৳ " + pBal.Nagad;
            document.getElementById("bankBal").innerText = "৳ " + pBal.Bank;

            let recent = document.getElementById("recentList"); recent.innerHTML = "";
            (data.recent || []).slice(0,3).forEach(item => {
                let cls = item.type == "Income" ? "green" : "red";
                recent.innerHTML += `
                    <div class="activity-item">
                        <div class="activity-info">
                            <h4>${item.category}</h4>
                            <p>${item.payment} • ${item.date}</p>
                        </div>
                        <div class="activity-amount ${cls}">৳ ${item.amount}</div>
                    </div>`;
            });

            let history = document.getElementById("historyList"); history.innerHTML = "";
            (data.recent || []).forEach((item) => {
                history.innerHTML += `
                    <div class="item">
                        <div style="flex:1">
                            <h4>${item.category}</h4>
                            <p style="font-size:11px; color:var(--sub);">${item.date}</p>
                            <span class="${getPayTagClass(item.payment)}">${item.payment}</span>
                            ${item.person ? `<span class="person-tag">👤 ${item.person}</span>` : ''}
                        </div>
                        <div class="amount ${item.type == "Income" ? "green" : "red"}">৳ ${item.amount}</div>
                    </div>`;
            });

            let recVal = data.receive || 0; let payVal = data.pay || 0;
            document.getElementById("receiveAmount").innerText = "৳ " + Math.abs(recVal);
            document.getElementById("payAmount").innerText = "৳ " + Math.abs(payVal);
            document.getElementById("loanStatus").innerText = "৳ " + (recVal - payVal);

            let loanSummary = document.getElementById("loanSummaryList"); loanSummary.innerHTML = "";
            let loanMap = {};
            (data.recent || []).forEach(item => {
                if(item.person && ["Give Loan","Take Loan","Loan Received","Loan Paid"].includes(item.category)){
                    let p = item.person.trim().toLowerCase();
                    if(!loanMap[p]) loanMap[p] = { name: item.person.trim(), bal: 0 };
                    let a = Number(item.amount);
                    if(item.category == "Give Loan" || item.category == "Loan Paid") loanMap[p].bal += a; else loanMap[p].bal -= a;
                }
            });
            for(let k in loanMap){
                if(loanMap[k].bal == 0) continue;
                loanSummary.innerHTML += `<div class="activity-item"><div><h4>${loanMap[k].name}</h4><p>${loanMap[k].bal > 0 ? 'Receive' : 'Pay'}</p></div><div class="activity-amount ${loanMap[k].bal > 0 ? 'green' : 'red'}">৳ ${Math.abs(loanMap[k].bal)}</div></div>`;
            }
        });
    }

    function filterHistory(){
        let v = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#historyList .item").forEach(i => i.style.display = i.innerText.toLowerCase().includes(v) ? "flex" : "none");
    }

    loadDashboard();
</script>
</body>
</html>
