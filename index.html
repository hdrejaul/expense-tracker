<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expense Tracker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Premium Light Mode */
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --sub: #64748b;
            --blue: #2563eb; --green: #10b981; --red: #ef4444; 
            --border: rgba(226, 232, 240, 0.8);
            --item-bg: #ffffff;
            --bkash: #d12053; --nagad: #f7941d; --bank: #006747;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.04);
        }

        body.dark-mode {
            --bg: #020617; --card: #0f172a; --text: #f8fafc; --sub: #94a3b8; 
            --border: #1e293b; --item-bg: #111a2e;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding: 18px 18px 110px; transition: all 0.3s ease; }
        .container { max-width: 500px; margin: auto; }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--blue); }
        .header-actions { display: flex; gap: 10px; }
        .icon-btn { border: none; background: var(--card); color: var(--text); width: 42px; height: 42px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); box-shadow: var(--shadow); font-size: 18px; transition: 0.3s; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spinning span { display: inline-block; animation: spin 0.8s linear infinite; }

        /* Wallet Grid */
        .wallet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 22px; }
        .wallet-card { 
            background: var(--card); padding: 12px 16px; border-radius: 16px; 
            border: 1px solid var(--border); box-shadow: var(--shadow); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .wallet-info h4 { font-size: 9px; color: var(--sub); text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
        .wallet-info h2 { font-size: 14px; font-weight: 700; }
        .wallet-dot { width: 6px; height: 6px; border-radius: 50%; }

        /* Stats */
        .main-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; } 
        .stat-box { background: var(--card); padding: 16px 5px; border-radius: 20px; border: 1px solid var(--border); text-align: center; box-shadow: var(--shadow); }
        .stat-box h4 { font-size: 10px; color: var(--sub); text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
        .stat-box h2 { font-size: 13px; font-weight: 800; }

        /* Form Card */
        .card { background: var(--card); padding: 24px; border-radius: 28px; margin-bottom: 25px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .card-title { font-size: 18px; font-weight: 800; margin-bottom: 18px; }

        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); background: var(--bg); border-radius: 14px; font-size: 14px; color: var(--text); outline: none; margin-bottom: 14px; font-weight: 500; }
        .save-btn { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); }

        /* Activity Card Style */
        .activity-card { background: var(--card); padding: 22px; border-radius: 28px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .activity-item { 
            background: var(--card); padding: 15px; border-radius: 18px; 
            margin-bottom: 10px; border: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--shadow);
        }
        .activity-info h4 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
        .activity-info p { font-size: 11px; color: var(--sub); }
        .activity-info span { font-size: 10px; color: var(--blue); font-weight: 600; text-transform: uppercase; }

        /* Tags */
        .pay-tag { color: white; font-size: 9px; padding: 4px 14px; border-radius: 10px; font-weight: 700; text-transform: uppercase; display: inline-block; margin-top: 10px; background: #64748b; }
        .pay-tag.bkash { background: var(--bkash); }
        .pay-tag.nagad { background: var(--nagad); }
        .pay-tag.bank { background: var(--bank); }
        .pay-tag.transfer { background: var(--blue); color: #ffffff; }
        
        /* Person Tag */
        .person-tag { 
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(37, 99, 235, 0.05)); 
            color: var(--blue); 
            font-size: 11px; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-weight: 700; 
            margin-left: 6px; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            border: 1px solid rgba(37, 99, 235, 0.2);
            text-transform: capitalize;
        }

        body.dark-mode .person-tag {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.15), rgba(96, 165, 250, 0.05)); 
            border-color: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }

        .person-icon-wrapper { display: flex; align-items: center; justify-content: center; }

        /* 🔥 Updated Regular Bottom Nav 🔥 */
        .bottom-nav { 
            position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); 
            width: 92%; max-width: 430px; background: var(--card); padding: 10px 15px; 
            border-radius: 35px; display: flex; justify-content: space-around; align-items: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 998; border: 1px solid var(--border); 
        }
        .nav-btn { 
            border: none; background: none; padding: 10px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; gap: 4px; 
            font-size: 11px; font-weight: 700; color: var(--sub); cursor: pointer; flex: 1; transition: 0.3s; 
        }
        .nav-btn.active-nav { color: var(--blue); }
        .nav-icon { font-size: 18px; margin-bottom: 2px; }

        /* 🔥 NEW: Standalone Floating Action Button (FAB) 🔥 */
        .standalone-fab {
            position: fixed;
            bottom: 95px; /* Positioned above the bottom nav */
            right: 25px; /* Aligned to the right edge */
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            z-index: 1000;
            transition: 0.3s;
        }
        .standalone-fab:active { transform: scale(0.92); }

        #toast { visibility: hidden; min-width: 250px; background: #10b981; color: white; text-align: center; border-radius: 50px; padding: 16px; position: fixed; z-index: 1001; left: 50%; bottom: 100px; transform: translateX(-50%); font-weight: 700; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3); }
        #toast.show { visibility: visible; animation: fadeInUp 0.4s forwards; }
        @keyframes fadeInUp { from { opacity: 0; bottom: 80px; } to { opacity: 1; bottom: 100px; } }

        .green { color: var(--green); } .red { color: var(--red); } .blue { color: var(--blue); }
        .amount { font-size: 16px; font-weight: 800; }
    </style>
</head>

<body class="dark-mode">

<div id="toast">✅ Saved Successfully!</div>

<div class="container">
    <!-- 🏠 Dashboard Page -->
    <div id="dashboard" class="page active">
        <div class="header">
            <div class="logo">Expense Tracker</div>
            <div class="header-actions">
                <button class="icon-btn" onclick="toggleDarkMode()">🌓</button>
                <button class="icon-btn" id="refreshBtn" onclick="hardRefresh()"><span>⟳</span></button>
            </div>
        </div>

        <!-- Wallets -->
        <div class="wallet-grid">
            <div class="wallet-card">
                <div class="wallet-info"><h4>Cash</h4><h2 id="cashBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:#64748b"></div>
            </div>
            <div class="wallet-card">
                <div class="wallet-info"><h4>Bkash</h4><h2 id="bkashBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:var(--bkash)"></div>
            </div>
            <div class="wallet-card">
                <div class="wallet-info"><h4>Nagad</h4><h2 id="nagadBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:var(--nagad)"></div>
            </div>
            <div class="wallet-card">
                <div class="wallet-info"><h4>Bank</h4><h2 id="bankBal">৳ 0</h2></div>
                <div class="wallet-dot" style="background:var(--bank)"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="main-stats">
            <div class="stat-box"><h4>Income</h4><h2 class="green" id="income">৳ 0</h2></div>
            <div class="stat-box"><h4>Expense</h4><h2 class="red" id="expense">৳ 0</h2></div>
            <div class="stat-box"><h4>Balance</h4><h2 class="blue" id="balance">৳ 0</h2></div>
        </div>

        <!-- Mini Loan Summary -->
        <div style="display: flex; gap: 10px; margin-bottom: 25px;">
            <div style="flex: 1; background: var(--card); padding: 12px 15px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div style="background: rgba(16, 185, 129, 0.15); color: var(--green); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                    </div>
                    <span style="font-size: 13px; font-weight: 800; color: var(--sub);">Get</span>
                </div>
                <span style="font-size: 15px; font-weight: 800; color: var(--green);" id="dashReceive">৳ 0</span>
            </div>
            
            <div style="flex: 1; background: var(--card); padding: 12px 15px; border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between;">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div style="background: rgba(239, 68, 68, 0.15); color: var(--red); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                    </div>
                    <span style="font-size: 13px; font-weight: 800; color: var(--sub);">Pay</span>
                </div>
                <span style="font-size: 15px; font-weight: 800; color: var(--red);" id="dashPay">৳ 0</span>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="activity-card">
            <div class="card-title" style="font-size: 16px;">⚡ Recent Activity</div>
            <div id="recentList"></div>
        </div>
    </div>

    <!-- ➕ Add Entry Page -->
    <div id="add-entry" class="page">
        <div class="card">
            <div class="card-title" style="text-align: center; color: var(--blue);">New Transaction</div>

            <select id="type" onchange="updateCategory()">
                <option value="">Select Type</option>
                <option>Income</option>
                <option>Expense</option>
                <option>Transfer</option>
            </select>

            <select id="category" onchange="handleCategoryChange()">
                <option value="">Select Category</option>
            </select>

            <select id="payment">
                <option>Cash</option>
                <option>Bkash</option>
                <option>Nagad</option>
                <option>Bank</option>
            </select>

            <input type="number" id="amount" placeholder="Amount (৳)">

            <input type="text" id="person" placeholder="Person Name" style="display:none;">

            <textarea id="note" placeholder="Note (Optional)" style="height: 100px;"></textarea>

            <button class="save-btn" id="saveBtn" onclick="saveData()">
                Save Transaction
            </button>
        </div>
    </div>

    <!-- 📜 History Page -->
    <div id="history" class="page">
        <div class="activity-card">
            <div class="card-title">All History</div>
            <input type="text" id="searchInput" placeholder="Search transactions..." onkeyup="filterHistory()">
            <div id="historyList"></div>
        </div>
    </div>

    <!-- 💰 Loans Page -->
    <div id="loans" class="page">
        <div class="card">
            <div class="card-title">Loan Summary</div>
            <div style="background: linear-gradient(135deg, #1e293b, #020617); padding: 35px 20px; border-radius: 28px; text-align: center; margin-bottom: 25px; border: 1px solid var(--border);">
                <h4 style="font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px;">Net Loan Status</h4>
                <h2 id="loanStatus" style="font-size: 30px; font-weight: 800; color: #60a5fa;">৳ 0</h2>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-bottom: 25px;">
                <div class="stat-box"><h4>Receive</h4><h2 class="green" id="receiveAmount">৳ 0</h2></div>
                <div class="stat-box"><h4>Pay</h4><h2 class="red" id="payAmount">৳ 0</h2></div>
            </div>
            <div id="loanSummaryList"></div>
        </div>
    </div>
</div>

<!-- 🔥 Standalone Floating Action Button (Separated from Bottom Nav) 🔥 -->
<button class="standalone-fab" onclick="showPage('add-entry', null)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
</button>

<!-- Bottom Navigation (Cleaned Up) -->
<nav class="bottom-nav">
    <button class="nav-btn active-nav" id="nav-home" onclick="showPage('dashboard', this)">
        <span class="nav-icon">🏠</span>Home
    </button>
    <button class="nav-btn" onclick="showPage('history', this)">
        <span class="nav-icon">📜</span>History
    </button>
    <button class="nav-btn" onclick="showPage('loans', this)">
        <span class="nav-icon">💰</span>Loans
    </button>
</nav>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxA3FVbmfnbYjPJHd6QmgWbZp2fe3MGtiVX9jWHJ6xBNzk4HYQJH0_5XZalXrba8c3YFg/exec";

    const userIcon = `<div class="person-icon-wrapper"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" /><circle cx="12" cy="8.5" r="3.5" fill="currentColor" /><path d="M5.5 19.5A7.5 7.5 0 0 1 12 13a7.5 7.5 0 0 1 6.5 6.5 Z" fill="currentColor" /></svg></div>`;

    function showPage(pageId, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        // Remove active class from all nav buttons
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-nav'));
        
        // Add active class only if it's a regular nav button
        if(btn && btn.classList.contains('nav-btn')) {
            btn.classList.add('active-nav');
        }
    }

    function toggleDarkMode() { document.body.classList.toggle("dark-mode"); }

    function formatAppDate(dateString) {
        let date = dateString ? new Date(dateString) : new Date();
        if(isNaN(date) && dateString.includes('-')) { return dateString; }
        let d = String(date.getDate()).padStart(2, '0');
        let m = String(date.getMonth() + 1).padStart(2, '0');
        let y = String(date.getFullYear()).slice(-2);
        return `${d}-${m}-${y}`;
    }

    function hardRefresh() {
        const btn = document.getElementById("refreshBtn");
        btn.classList.add("spinning");
        document.getElementById("amount").value = "";
        document.getElementById("note").value = "";
        document.getElementById("person").value = "";
        document.getElementById("type").value = "";
        document.getElementById("category").innerHTML = '<option value="">Select Category</option>';
        document.getElementById("payment").style.display = "block";
        document.getElementById("person").style.display = "none";
        loadDashboard().finally(() => { setTimeout(() => btn.classList.remove("spinning"), 1000); });
    }

    function updateCategory() {
        let type = document.getElementById("type").value;
        let cat = document.getElementById("category");
        let paymentField = document.getElementById("payment");

        cat.innerHTML = "";
        let opts = [];

        if (type == "Income") {
            opts = ["Salary", "Extra Work", "Bonus", "Take Loan", "Loan Received"];
            paymentField.style.display = "block"; 
        } 
        else if (type == "Expense") {
            opts = ["Personal", "Family", "Home Expense", "Bills", "DPS Payment", "Give Loan", "Loan Paid"];
            paymentField.style.display = "block"; 
        } 
        else if (type == "Transfer") {
            opts = ["Bank To Bkash", "Bank To Nagad", "Bank To Cash", "Bkash To Bank", "Cash To Bank", "Nagad To Bank"];
            paymentField.style.display = "none"; 
        }

        opts.forEach(o => {
            let el = document.createElement("option");
            el.value = o;
            el.text = o;
            cat.appendChild(el);
        });

        if(opts.length > 0) handleCategoryChange();
    }

    function handleCategoryChange() {
        let cat = document.getElementById("category").value;
        let paymentField = document.getElementById("payment");

        document.getElementById("person").style.display =
            ["Give Loan", "Take Loan", "Loan Received", "Loan Paid"].includes(cat) ? "block" : "none";

        if (cat === "DPS Payment") paymentField.value = "Bkash";
        if (cat === "Bank To Bkash") paymentField.value = "Bkash";
        if (cat === "Bank To Nagad") paymentField.value = "Nagad";
        if (cat === "Bank To Cash") paymentField.value = "Cash";
        if (cat === "Bkash To Bank") paymentField.value = "Bank";
        if (cat === "Cash To Bank") paymentField.value = "Bank";
        if (cat === "Nagad To Bank") paymentField.value = "Bank";
    }

    function saveData() {
        let btn = document.getElementById("saveBtn");
        let type = document.getElementById("type").value;
        let category = document.getElementById("category").value;
        let amount = document.getElementById("amount").value;
        
        if (!type || !category || !amount) {
            alert("Please fill in the required fields!");
            return;
        }

        btn.innerText = "Processing...";
        let data = {
            date: formatAppDate(), 
            type: type,
            category: category,
            payment: document.getElementById("payment").value,
            amount: amount,
            person: document.getElementById("person").value,
            note: document.getElementById("note").value
        };

        fetch(SCRIPT_URL, { method:"POST", body:JSON.stringify(data) }).then(() => { 
            btn.innerText = "Save Transaction"; 
            document.getElementById("toast").classList.add("show");
            setTimeout(() => { document.getElementById("toast").classList.remove("show"); }, 3000);
            
            // Redirect back to Dashboard after saving
            hardRefresh(); 
            showPage('dashboard', document.getElementById('nav-home'));

        }).catch(err => {
            console.error(err);
            btn.innerText = "Save Transaction";
            alert("Something went wrong!");
        });
    }

    async function loadDashboard() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            // SMART LOGIC FOR INCOME & EXPENSE
            let calcIncome = 0;
            let calcExpense = 0;

            (data.recent || []).forEach(item => {
                let amt = Number(item.amount);
                
                if (item.type === "Income") {
                    if (item.category === "Loan Received") {
                        calcExpense -= amt; 
                    } else {
                        calcIncome += amt; 
                    }
                } 
                else if (item.type === "Expense") {
                    if (item.category === "Loan Paid") {
                        calcIncome -= amt; 
                    } else {
                        calcExpense += amt; 
                    }
                }
            });

            document.getElementById("income").innerText = "৳ " + calcIncome;
            document.getElementById("expense").innerText = "৳ " + calcExpense;
            document.getElementById("balance").innerText = "৳ " + (calcIncome - calcExpense);
            
            // Wallet Calculation
            let pBal = { Cash: 0, Bkash: 0, Nagad: 0, Bank: 0 };
            (data.recent || []).forEach(item => {
                let amt = Number(item.amount);
                if (item.type === "Transfer") {
                    if (item.category === "Bank To Bkash") { pBal.Bank -= amt; pBal.Bkash += amt; }
                    else if (item.category === "Bank To Nagad") { pBal.Bank -= amt; pBal.Nagad += amt; }
                    else if (item.category === "Bank To Cash") { pBal.Bank -= amt; pBal.Cash += amt; }
                    else if (item.category === "Bkash To Bank") { pBal.Bkash -= amt; pBal.Bank += amt; }
                    else if (item.category === "Cash To Bank") { pBal.Cash -= amt; pBal.Bank += amt; }
                    else if (item.category === "Nagad To Bank") { pBal.Nagad -= amt; pBal.Bank += amt; }
                } else {
                    if (pBal.hasOwnProperty(item.payment)) {
                        pBal[item.payment] += (item.type === "Income" ? amt : -amt);
                    }
                }
            });
            
            document.getElementById("cashBal").innerText = "৳ " + pBal.Cash;
            document.getElementById("bkashBal").innerText = "৳ " + pBal.Bkash;
            document.getElementById("nagadBal").innerText = "৳ " + pBal.Nagad;
            document.getElementById("bankBal").innerText = "৳ " + pBal.Bank;

            // Recent Activity Rendering
            let recent = document.getElementById("recentList"); recent.innerHTML = "";
            (data.recent || []).slice(0,3).forEach(item => {
                let cls = item.type == "Income" ? "green" : (item.type == "Transfer" ? "blue" : "red");
                let prefix = item.type == "Income" ? "+" : (item.type == "Expense" ? "-" : "");
                let displayDate = formatAppDate(item.date); 
                recent.innerHTML += `
                    <div class="activity-item">
                        <div class="activity-info">
                            <h4>${item.category}</h4>
                            <p>${displayDate}</p>
                            <span>${item.type === "Transfer" ? "Transfer" : item.payment}</span>
                        </div>
                        <div class="amount ${cls}">${prefix}৳ ${item.amount}</div>
                    </div>`;
            });

            // History Rendering 
            let history = document.getElementById("historyList"); history.innerHTML = "";
            (data.recent || []).forEach((item) => {
                let cls = item.type == "Income" ? "green" : (item.type == "Transfer" ? "blue" : "red");
                let prefix = item.type == "Income" ? "+" : (item.type == "Expense" ? "-" : "");
                let displayDate = formatAppDate(item.date); 
                history.innerHTML += `
                    <div class="activity-item">
                        <div style="flex:1">
                            <h4 style="font-size:15px; font-weight:700;">${item.category}</h4>
                            <p style="font-size:11px; color:var(--sub); margin-bottom:4px;">${displayDate}</p>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top:8px;">
                                <span class="${item.type === "Transfer" ? "pay-tag transfer" : getPayTagClass(item.payment)}">${item.type === "Transfer" ? "Transfer" : item.payment}</span>
                                ${item.person ? `<span class="person-tag">${userIcon} <span>${item.person}</span></span>` : ''}
                            </div>
                            ${item.note ? `<div style="background:rgba(100,116,139,0.05); padding:10px; border-radius:12px; margin-top:10px; font-size:11px; font-style:italic; border-left:3px solid var(--blue);">"${item.note}"</div>` : ''}
                        </div>
                        <div style="text-align:right; margin-left:15px;">
                            <div class="amount ${cls}">${prefix}৳ ${item.amount}</div>
                        </div>
                    </div>`;
            });

            // Loans Handling (Populates both Dashboard & Loans Page)
            let recVal = data.receive || 0; let payVal = data.pay || 0;
            
            // For Dashboard Widgets
            document.getElementById("dashReceive").innerText = "৳ " + Math.abs(recVal);
            document.getElementById("dashPay").innerText = "৳ " + Math.abs(payVal);
            
            // For Loans Page
            document.getElementById("receiveAmount").innerText = "৳ " + Math.abs(recVal);
            document.getElementById("payAmount").innerText = "৳ " + Math.abs(payVal);
            document.getElementById("loanStatus").innerText = "৳ " + (recVal - payVal);

            let loanSummary = document.getElementById("loanSummaryList"); loanSummary.innerHTML = "";
            let loanMap = {};
            (data.recent || []).forEach(item => {
                if(item.person && ["Give Loan","Take Loan","Loan Received","Loan Paid"].includes(item.category)){
                    let p = item.person.trim().toLowerCase();
                    if(!loanMap[p]) loanMap[p] = { name: item.person.trim(), bal: 0 };
                    let a = Number(item.amount);
                    if(item.category == "Give Loan" || item.category == "Loan Paid") loanMap[p].bal += a; else loanMap[p].bal -= a;
                }
            });
            for(let k in loanMap){
                if(loanMap[k].bal == 0) continue;
                loanSummary.innerHTML += `<div class="activity-item"><div><h4 style="font-size:16px; font-weight:700;">${loanMap[k].name}</h4><p style="font-size:12px; color:var(--sub);">${loanMap[k].bal > 0 ? 'Will Receive' : 'Need To Pay'}</p></div><div style="font-weight:800; font-size:17px;" class="${loanMap[k].bal > 0 ? "green" : "red"}">৳ ${Math.abs(loanMap[k].bal)}</div></div>`;
            }
        } catch (e) { console.log(e); }
    }

    function getPayTagClass(m){
        if(!m) return "pay-tag";
        m = m.toLowerCase();
        if(m.includes("bkash")) return "pay-tag bkash";
        if(m.includes("nagad")) return "pay-tag nagad";
        if(m.includes("bank")) return "pay-tag bank";
        return "pay-tag";
    }

    function filterHistory(){
        let v = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#historyList .activity-item").forEach(i => i.style.display = i.innerText.toLowerCase().includes(v) ? "flex" : "none");
    }

    loadDashboard();
</script>
</body>
</html>
